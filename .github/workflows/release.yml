name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"
          - os: macos-13
            target: macos-x64
            ext: ""
          - os: macos-latest
            target: macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build executable
        working-directory: Agent管理器
        run: |
          pyinstaller build/Agent管理器.spec --clean --noconfirm

      - name: Rename artifacts (Linux/Windows)
        if: matrix.os != 'macos-13' && matrix.os != 'macos-latest'
        shell: bash
        working-directory: Agent管理器
        run: |
          mkdir -p dist/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp dist/Agent管理器${{ matrix.ext }} dist/release/Agent管理器-${{ matrix.target }}${{ matrix.ext }}
          else
            cp dist/Agent管理器 dist/release/Agent管理器-${{ matrix.target }}
          fi

      - name: Rename artifacts (macOS)
        if: matrix.os == 'macos-13' || matrix.os == 'macos-latest'
        working-directory: Agent管理器
        run: |
          mkdir -p dist/release
          zip -r dist/release/Agent管理器-${{ matrix.target }}.zip "dist/Agent管理器.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-manager-${{ matrix.target }}
          path: Agent管理器/dist/release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: agent-manager-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**/*
          generate_release_notes: true
