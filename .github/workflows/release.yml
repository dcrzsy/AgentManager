name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64
          - os: macos-latest
            target: macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow

      - name: Build executable
        run: |
          pyinstaller Agent管理器.spec --clean --noconfirm

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Create AppDir
          mkdir -p AppDir/usr/bin
          cp dist/Agent管理器 AppDir/usr/bin/
          mkdir -p AppDir/usr/share/applications
          cp Agent管理器.desktop AppDir/usr/share/applications/
          ln -s usr/share/applications/Agent管理器.desktop AppDir/Agent管理器.desktop
          ln -s usr/bin/Agent管理器 AppDir/AppRun

          # Generate icon sizes
          python - <<'PY'
          from PIL import Image
          import os
          img = Image.open("assets/icon.png")
          for size in (16, 32, 48, 64, 128, 256, 512):
              out = f"AppDir/usr/share/icons/hicolor/{size}x{size}/apps"
              os.makedirs(out, exist_ok=True)
              img.resize((size, size), Image.LANCZOS).save(f"{out}/Agent管理器.png")
          PY

          # AppImage requires the icon at AppDir root too
          cp AppDir/usr/share/icons/hicolor/256x256/apps/Agent管理器.png AppDir/Agent管理器.png

          # Build AppImage
          curl -sLO --retry 5 https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool-x86_64.AppImage AppDir

          mkdir -p dist/release
          mv Agent管理器-x86_64.AppImage dist/release/Agent管理器-${{ matrix.target }}.AppImage

      - name: Rename artifacts (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist/release
          cp dist/Agent管理器.exe dist/release/Agent管理器-${{ matrix.target }}.exe

      - name: Rename artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dist/release
          zip -r dist/release/Agent管理器-${{ matrix.target }}.zip "dist/Agent管理器.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-manager-${{ matrix.target }}
          path: dist/release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          pattern: agent-manager-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/**/*
          generate_release_notes: true
